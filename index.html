<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gateway</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0ede8;
    --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
    --border:#e5e5e5;--border2:#d0d0d0;
    --accent:#534AB7;--accent-light:#EEEDFE;--accent-text:#3C3489;
    --radius:10px;--radius-sm:6px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
      --text:#f0f0f0;--text2:#aaa;--text3:#666;
      --border:#333;--border2:#444;
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
  .logo{font-size:15px;font-weight:500;letter-spacing:-.3px}
  .dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;margin-right:2px;flex-shrink:0}
  .dot.red{background:#E24B4A}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  select{font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;outline:none;max-width:180px}
  select:hover{border-color:var(--accent)}
  .usage{display:flex;gap:12px;padding:5px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
  .u-item{display:flex;align-items:center;gap:4px}
  .u-dot{width:5px;height:5px;border-radius:50%}
  .toolbar{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .tbtn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
  .tbtn:hover{background:var(--bg3);color:var(--text)}
  .tbtn.on{background:var(--accent-light);color:var(--accent-text);border-color:#AFA9EC}
  .msgs{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:80%;width:fit-content}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.ai{align-self:flex-start}
  .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;margin-top:1px}
  .av-ai{background:var(--accent-light);color:var(--accent-text)}
  .av-u{background:#E1F5EE;color:#0F6E56}
  .bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.65;border:1px solid var(--border);background:var(--bg);color:var(--text);white-space:pre-wrap;word-break:break-word;word-wrap:break-word;overflow-wrap:break-word;min-width:0}
  .msg.user .bubble{background:var(--bg2)}
  .meta{font-size:11px;color:var(--text3);margin-top:4px;padding:0 2px}
  .msg.user .meta{text-align:right}
  .thinking-row{display:flex;gap:10px;align-items:center}
  .dots{display:flex;gap:4px}
  .dots span{width:6px;height:6px;border-radius:50%;background:var(--border2);animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .welcome{text-align:center;padding:40px 20px;color:var(--text2)}
  .welcome svg{width:40px;height:40px;margin-bottom:12px;opacity:.3}
  .welcome h2{font-size:16px;font-weight:500;margin-bottom:6px;color:var(--text)}
  .welcome p{font-size:13px;line-height:1.6}
  .inputbar{border-top:1px solid var(--border);padding:12px 16px;background:var(--bg);flex-shrink:0}
  .input-wrap{display:flex;gap:8px;align-items:flex-end;border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;background:var(--bg);transition:border-color .15s}
  .input-wrap:focus-within{border-color:var(--accent)}
  textarea{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);resize:none;outline:none;max-height:160px;min-height:24px;font-family:inherit;line-height:1.5}
  textarea::placeholder{color:var(--text3)}
  .send{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
  .send:hover{opacity:.85}
  .send:disabled{opacity:.35;cursor:default}
  .send svg{width:16px;height:16px}
  .hint{font-size:11px;color:var(--text3);margin-top:5px;text-align:center}
  code{font-family:'SF Mono',Consolas,monospace;font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:3px}
  pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;overflow-x:auto;margin:8px 0}
  pre code{background:none;padding:0}
</style>
</head>
<body>

<div class="topbar">
  <div class="dot" id="status-dot"></div>
  <div class="logo">AI Gateway</div>
  <div class="topbar-right">
    <select id="model-sel" onchange="onModelChange()">
      <option value="auto" selected>🤖 自动选择</option>
      <optgroup label="OpenRouter（主力）">
        <option value="gemma-4-31b">Gemma 4 31B</option>
        <option value="gemma-4-26b">Gemma 4 26B</option>
        <option value="deepseek-r1">DeepSeek R1</option>
        <option value="qwen3-80b">Qwen3 80B</option>
        <option value="nemotron-120b">Nemotron 120B</option>
        <option value="gpt-oss-120b">GPT OSS 120B</option>
        <option value="glm-4.5-air">GLM 4.5 Air</option>
        <option value="minimax-m2.5">MiniMax M2.5</option>
      </optgroup>
      <optgroup label="Google AI Studio">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
      </optgroup>
      <optgroup label="Groq">
        <option value="llama-3.3-70b">Llama 3.3 70B</option>
        <option value="gemma2-9b">Gemma 2 9B</option>
      </optgroup>
      <optgroup label="Cloudflare">
        <option value="qwen2.5-72b">Qwen 2.5 72B</option>
      </optgroup>
      <optgroup label="Hugging Face">
        <option value="mistral-7b-hf">Mistral 7B</option>
      </optgroup>
    </select>
    <button class="tbtn" onclick="clearChat()">清空</button>
  </div>
</div>

<div class="usage" id="usage-bar"></div>

<div class="toolbar">
  <button class="tbtn on" onclick="setMode('chat',this)">💬 对话</button>
  <button class="tbtn" onclick="setMode('translate',this)">🌐 翻译</button>
  <button class="tbtn" onclick="setMode('code',this)">💻 代码</button>
  <button class="tbtn" onclick="setMode('summary',this)">📝 总结</button>
  <button class="tbtn" onclick="setMode('polish',this)">✨ 润色</button>
</div>

<div class="msgs" id="msgs">
  <div class="welcome" id="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
    </svg>
    <h2>AI Gateway 已就绪</h2>
    <p>接入 5 个平台 · 多个免费模型<br>默认自动选择可用模型</p>
  </div>
</div>

<div class="inputbar">
  <div class="input-wrap">
    <textarea id="inp" placeholder="输入消息，Enter 发送，Shift+Enter 换行" rows="1"
      oninput="resize()" onkeydown="onKey(event)"></textarea>
    <button class="send" id="send-btn" onclick="send()" disabled aria-label="发送">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
    </button>
  </div>
  <div class="hint">后端地址：<span id="api-url-display" style="font-family:monospace"></span></div>
</div>

<script>
const API_BASE = "https://wa121325.duckdns.org";
const SECRET   = "mindflow2026";

const PROVIDERS = {
  "auto":"Auto",
  "gemma-4-31b":"OpenRouter","gemma-4-26b":"OpenRouter","deepseek-r1":"OpenRouter",
  "qwen3-80b":"OpenRouter","nemotron-120b":"OpenRouter","gpt-oss-120b":"OpenRouter",
  "glm-4.5-air":"OpenRouter","minimax-m2.5":"OpenRouter",
  "gemini-2.5-flash":"Google","gemini-2.0-flash":"Google",
  "llama-3.3-70b":"Groq","gemma2-9b":"Groq",
  "qwen2.5-72b":"Cloudflare",
  "mistral-7b-hf":"HuggingFace"
};
const PROVIDER_COLORS = {Auto:"#888",OpenRouter:"#534AB7",Google:"#1D9E75",Groq:"#D85A30",Cloudflare:"#378ADD",HuggingFace:"#BA7517"};
const USAGE = {Auto:0,OpenRouter:0,Google:0,Groq:0,Cloudflare:0,HuggingFace:0};

const MODES = {
  chat:     {sys:"你是一个有帮助的AI助手，回答简洁清晰。"},
  translate:{sys:"你是专业翻译。用户输入中文翻译为英文，输入英文翻译为中文，只输出译文。"},
  code:     {sys:"你是代码助手。优先输出代码，附简短说明，使用markdown代码块。"},
  summary:  {sys:"将用户输入的内容提炼为简洁要点，用列表格式输出。"},
  polish:   {sys:"对用户输入的文字进行语言润色，保持原意，使表达更流畅自然。直接输出润色后的文字。"},
};

let history = [];
let mode = "chat";
let busy = false;
let currentModel = "auto";

document.getElementById("api-url-display").textContent = API_BASE;

function updateUsageBar(){
  document.getElementById("usage-bar").innerHTML =
    Object.entries(PROVIDER_COLORS).map(([p, color])=>{
      return `<div class="u-item"><div class="u-dot" style="background:${color}"></div>${p} <b style="color:var(--text)">${USAGE[p]||0} 次</b></div>`;
    }).join("");
}

function onModelChange(){
  currentModel = document.getElementById("model-sel").value;
}

function setMode(m, el){
  mode = m;
  document.querySelectorAll(".tbtn").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
}

function resize(){
  const t = document.getElementById("inp");
  t.style.height = "auto";
  t.style.height = Math.min(t.scrollHeight, 160) + "px";
  document.getElementById("send-btn").disabled = !t.value.trim();
}

function onKey(e){
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
}

function addMsg(role, text, model, provider){
  const msgs = document.getElementById("msgs");
  const w = document.getElementById("welcome");
  if(w) w.remove();
  const div = document.createElement("div");
  div.className = "msg " + (role==="user" ? "user" : "ai");
  const av = document.createElement("div");
  av.className = "av " + (role==="user" ? "av-u" : "av-ai");
  av.textContent = role==="user" ? "我" : "AI";
  const right = document.createElement("div");
  right.style.cssText = "display:flex;flex-direction:column;min-width:0;flex:1";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = renderMarkdown(text);
  right.appendChild(bubble);
  if(provider){
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = model + " · " + provider;
    right.appendChild(meta);
  }
  div.appendChild(av);
  div.appendChild(right);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function renderMarkdown(text){
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
}

let thinkingEl = null;
function showThinking(){
  const msgs = document.getElementById("msgs");
  const w = document.getElementById("welcome");
  if(w) w.remove();
  const div = document.createElement("div");
  div.className = "msg ai";
  div.innerHTML = `<div class="av av-ai">AI</div><div class="thinking-row"><div class="dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  thinkingEl = div;
}
function hideThinking(){ if(thinkingEl){ thinkingEl.remove(); thinkingEl=null; } }

async function send(){
  if(busy) return;
  const inp = document.getElementById("inp");
  const text = inp.value.trim();
  if(!text) return;
  inp.value = ""; resize();
  addMsg("user", text, "", "");
  history.push({role:"user", content:text});
  busy = true;
  document.getElementById("send-btn").disabled = true;
  showThinking();

  const messages = [
    {role:"system", content: MODES[mode].sys},
    ...history
  ];

  try{
    const res = await fetch(`${API_BASE}/v1/chat/completions`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${SECRET}`
      },
      body: JSON.stringify({
        model: currentModel,
        messages,
        max_tokens: 1500,
        temperature: 0.7,
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({detail:"Unknown error"}));
      throw new Error(err.detail || res.statusText);
    }
    const data = await res.json();
    const reply = data.choices[0].message.content;
    const actualModel = data.model || currentModel;
    const actualProvider = data.provider || PROVIDERS[currentModel] || "Auto";
    hideThinking();
    USAGE[actualProvider] = (USAGE[actualProvider]||0) + 1;
    history.push({role:"assistant", content:reply});
    addMsg("ai", reply, actualModel, actualProvider);
    updateUsageBar();
    document.getElementById("status-dot").className = "dot";
  } catch(e){
    hideThinking();
    addMsg("ai", `⚠️ 请求失败：${e.message}\n\n请检查后端是否运行，或 API Key 是否配置正确。`, "", "");
    document.getElementById("status-dot").className = "dot red";
  }
  busy = false;
  document.getElementById("send-btn").disabled = false;
}

function clearChat(){
  history = [];
  document.getElementById("msgs").innerHTML = `<div class="welcome" id="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
    </svg>
    <h2>已清空对话</h2><p>选择模型，开始新对话</p></div>`;
}

updateUsageBar();
</script>
</body>
</html>
